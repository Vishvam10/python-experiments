version: "3"

vars:
  BENCH_DIR: .
  RESULTS_DIR: "{{.BENCH_DIR}}/results"
  VENV_DIR: .venv
  PYTHON: "{{.VENV_DIR}}/bin/python"

tasks:

  # ----------------------------
  # Setup (uv)
  # ----------------------------
  setup:
    desc: Create venv and install dependencies using uv
    cmds:
      - uv venv {{.VENV_DIR}}
      - uv sync
      - echo "Environment ready"

  # ----------------------------
  # Benchmark pipeline
  # ----------------------------
  bench:
    desc: Run benchmark + plot (no report)
    cmds:
      - |
        RUN_DIR=$(date +"%d-%m-%Y-%H-%M")
        echo "Results directory: $RUN_DIR"

        mkdir -p {{.RESULTS_DIR}}/$RUN_DIR/plots

        echo "Running Python benchmarks..."
        uv run python {{.BENCH_DIR}}/bench.py "$RUN_DIR"

        if [ -f "{{.BENCH_DIR}}/compare.py" ]; then
          echo "Comparing results..."
          uv run python {{.BENCH_DIR}}/compare.py "$RUN_DIR" || true
        fi

        echo "Generating plots..."
        uv run python {{.BENCH_DIR}}/plot.py "$RUN_DIR"

        echo "Done. Results saved to {{.RESULTS_DIR}}/$RUN_DIR/"

  # ----------------------------
  # Plot latest
  # ----------------------------
  plot:
    desc: Plot latest benchmark results
    cmds:
      - |
        LATEST=$(ls -dt {{.RESULTS_DIR}}/*/ 2>/dev/null | head -1)

        if [ -z "$LATEST" ]; then
          echo "No results found. Run 'task bench' first."
          exit 1
        fi

        RUN_DIR=$(basename "$LATEST")
        echo "Using latest run: $RUN_DIR"

        uv run python {{.BENCH_DIR}}/plot.py "$RUN_DIR"

  # ----------------------------
  # Consolidate latest to .md
  # ----------------------------
  consolidate:
    desc: Generate markdown report for latest run
    cmds:
      - |
        LATEST=$(ls -dt {{.RESULTS_DIR}}/*/ 2>/dev/null | head -1)

        if [ -z "$LATEST" ]; then
          echo "No results found"
          exit 1
        fi

        RUN_DIR=$(basename "$LATEST")

        if [ ! -f "{{.RESULTS_DIR}}/$RUN_DIR/results.json" ]; then
          echo "Invalid run dir: $RUN_DIR (missing results.json)"
          exit 1
        fi

        echo "Generating report for: $RUN_DIR"
        uv run python {{.BENCH_DIR}}/consolidate.py "$RUN_DIR"

  # ----------------------------
  # Full pipeline
  # ----------------------------
  run:
    desc: Full pipeline (bench + plot + consolidate)
    cmds:
      - |
        RUN_DIR=$(date +"%d-%m-%Y-%H-%M")
        echo "Run: $RUN_DIR"

        mkdir -p {{.RESULTS_DIR}}/$RUN_DIR/plots

        echo "Running benchmark..."
        uv run python {{.BENCH_DIR}}/bench.py "$RUN_DIR"

        echo "Generating plots..."
        uv run python {{.BENCH_DIR}}/plot.py "$RUN_DIR"

        echo "Generating report..."
        uv run python {{.BENCH_DIR}}/consolidate.py "$RUN_DIR"

        echo "Done -> {{.RESULTS_DIR}}/$RUN_DIR/"

  # ----------------------------
  # Lint (ruff)
  # ----------------------------
  lint:
    desc: Run lint checks
    cmds:
      - uv run ruff check .

  lint-fix:
    desc: Auto-fix lint issues (including imports)
    cmds:
      - uv run ruff check . --fix

  # ----------------------------
  # Import sorting
  # ----------------------------
  imports:
    desc: Fix import ordering via ruff
    cmds:
      - uv run ruff check . --select I --fix

  # ----------------------------
  # Formatting
  # ----------------------------
  format:
    desc: Format code with black
    cmds:
      - uv run black .

  # ----------------------------
  # Full dev pass
  # ----------------------------
  dev:
    desc: Format + lint fix + import sort
    cmds:
      - task: format
      - task: imports
      - task: lint-fix

  # ----------------------------
  # Clean
  # ----------------------------
  clean:
    desc: Remove benchmark results
    cmds:
      - rm -rf {{.RESULTS_DIR}}/*
      - echo "Cleaned results"

  # ----------------------------
  # List runs
  # ----------------------------
  list:
    desc: List benchmark runs
    cmds:
      - ls -dt {{.RESULTS_DIR}}/*/ 2>/dev/null || echo "No runs found"