[project]
name = "execution-models"
version = "0.1.0"
description = "Comparison between thread, process and interpreter pool"
authors = [{ name = "Vishvam", email = "s.vishvam1025@gmail.com" }]

readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "matplotlib>=3.10.8",
    "numpy>=2.4.3",
    "psutil>=7.2.2",
]


[dependency-groups]
dev = [
    "catppuccin>=2.5.0",
    "ruff>=0.12.1",
]

[tool.ruff]
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "*_pb2*.py*",         # gRPC auto-generated files
]

line-length = 80
indent-width = 4
target-version = "py312"

[tool.ruff.lint]
exclude = ["*_pb2*.py"]
select = ["E4", "E7", "E9", "F"]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.pycodestyle]
ignore-overlong-task-comments = false
max-doc-length = 80

[tool.ruff.format]
exclude = ["*_pb2*.py"]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.coverage.run]
branch = true
omit = ["*_pb2*.py", "tests/*", "*/tests/*", "*_test.py", "test_*.py"]

[tool.coverage.report]
skip_covered = true
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
